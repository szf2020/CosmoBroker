name: AMQP Compare

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  compare-amqp:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore and build compare targets
        run: |
          dotnet restore CosmoBroker.Server/CosmoBroker.Server.csproj
          dotnet restore CosmoBroker.Benchmarks/CosmoBroker.Benchmarks.csproj
          dotnet build CosmoBroker.Server/CosmoBroker.Server.csproj -c Release --no-restore
          dotnet build CosmoBroker.Benchmarks/CosmoBroker.Benchmarks.csproj -c Release --no-restore

      - name: Run AMQP comparison
        env:
          COUNT: 1000
          PAYLOAD: 128
          LATENCY: 100
          TIMEOUT_MS: 3000
        run: bash benchmarks/compare_amqp.sh

      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: amqp-compare-report
          path: |
            benchmarks/amqp-compare-report.txt
            benchmarks/cosmobroker-amqp-compare.log
